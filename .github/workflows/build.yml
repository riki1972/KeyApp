name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.8.17'
          
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          
      - name: Install Cython & Buildozer
        run: |
          pip install --upgrade pip
          pip install cython==0.29.19
          pip install buildozer==1.5.0
          
      - name: Create buildozer.spec
        run: |
          cat > buildozer.spec << 'EOF'
[app]
title = Keygen Zebra
package.name = keygenzebra
package.domain = org.example
source.dir = .
source.include_exts = py,png,jpg,kv,atlas
version = 0.1
requirements = python3,kivy
orientation = portrait
fullscreen = 0
android.accept_sdk_license = True
android.api = 30
android.minapi = 21
android.ndk = 23b
android.sdk = 24
android.archs = armeabi-v7a
android.ndk_path = 

[buildozer]
log_level = 2
warn_on_root = 1
EOF
          
      - name: Fix Python environment
        run: |
          # Forza la reinstallazione di certifi (problema comune)
          pip install --upgrade certifi
          
      - name: Build APK
        run: |
          export PATH=$HOME/.local/bin:$PATH
          # Pulisci build precedenti
          buildozer android clean
          # Avvia la build
          buildozer -v android debug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: bin/*.apk
