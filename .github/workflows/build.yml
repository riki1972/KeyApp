name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          
      - name: Install Cython & Buildozer
        run: |
          pip install --upgrade pip
          pip install cython==0.29.19 buildozer
          
      - name: Configure Buildozer
        run: |
          if [ ! -f buildozer.spec ]; then
            buildozer init
          fi
          # Modifiche per stabilità
          sed -i 's/# android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec
          sed -i 's/# android.ndk = .*/android.ndk = 23b/' buildozer.spec
          sed -i 's/# android.sdk = .*/android.sdk = 24/' buildozer.spec
          sed -i 's/# android.api = .*/android.api = 31/' buildozer.spec
          sed -i 's/# android.minapi = .*/android.minapi = 21/' buildozer.spec
          # Aggiunte per evitare errori comuni
          echo "android.gradle_repository = true" >> buildozer.spec
          echo "android.cmake = True" >> buildozer.spec
          
      - name: Build APK with more memory
        run: |
          export GRADLE_OPTS="-Xmx2048m"
          buildozer -v android debug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: bin/*.apk
